<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HeatLoad Pro" />
    <meta name="theme-color" content="#18181b" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/heatload/192/192" />
    <title>HeatLoad Pro</title>
    <!-- v2.0.2 -->
  </head>
  <body>
    <div id="root"></div>
    <!-- Блок для отладки ошибок (поможет нам, если будет белый экран) -->
    <div id="debug-error" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; color:red; padding:20px; z-index:9999; overflow:auto; font-family:monospace;">
      <h1 style="color:black">Ошибка запуска приложения:</h1>
      <pre id="error-stack"></pre>
      <p style="color:black; margin-top:20px;">Попробуйте очистить кэш браузера или открыть в режиме инкогнито.</p>
    </div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var debugDiv = document.getElementById('debug-error');
        var stack = document.getElementById('error-stack');
        debugDiv.style.display = 'block';
        stack.textContent = msg + '\nat ' + url + ':' + lineNo + ':' + columnNo + '\n\n' + (error && error.stack ? error.stack : '');
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var debugDiv = document.getElementById('debug-error');
        var stack = document.getElementById('error-stack');
        debugDiv.style.display = 'block';
        stack.textContent = 'Unhandled Promise Rejection: ' + event.reason;
      });
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
