<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HeatLoad Pro" />
    <meta name="theme-color" content="#18181b" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/heatload/192/192" />
    <title>HeatLoad Pro</title>
    
  </head>
  <body>
    <div id="root">
      <div id="loading-screen" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #71717a; text-align: center; padding: 20px;">
        <div id="status-text">Загрузка HeatLoad Pro...</div>
        <div id="error-display" style="color: #ef4444; margin-top: 20px; font-size: 14px; display: none; background: #fee2e2; padding: 10px; border-radius: 8px; max-width: 100%; word-break: break-all;"></div>
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var display = document.getElementById('error-display');
        if (display) {
          display.style.display = 'block';
          display.innerHTML = 'Ошибка: ' + msg + '<br>Строка: ' + lineNo;
        }
        return false;
      };
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
